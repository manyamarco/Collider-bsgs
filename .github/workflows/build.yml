name: Build Collider-BSGS

# Сборка требует коммерческого компилятора PureBasic (v5.31+), которого нет
# в стандартных раннерах GitHub и нельзя поставить через apt. Дистрибутив хранится
# в самом репозитории в ЗАШИФРОВАННОМ виде (PureBasic_5_31_x64.tgz.enc, AES-256).
# Раннер расшифровывает его локально паролем из секрета PB_PASSPHRASE
# (Settings -> Secrets and variables -> Actions). Никаких обращений вовне нет.
#
# CUDA-ядро уже встроено в PureBasic/kernel_data.pbi, поэтому CUDA Toolkit / nvcc
# для СБОРКИ не нужен. GPU на раннере тоже не нужен — но и запустить/протестировать
# бинарник в CI нельзя (у раннеров нет видеокарты NVIDIA). CI = только сборка + артефакт.

on:
  push:
    branches: [ main ]
    paths:
      - 'PureBasic/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard - secret present
        run: |
          if [ -z "${{ secrets.PB_PASSPHRASE }}" ]; then
            echo "::error::Задайте секрет PB_PASSPHRASE (пароль расшифровки PureBasic_5_31_x64.tgz.enc)."
            exit 1
          fi

      - name: Decrypt & unpack PureBasic
        env:
          PB_PASSPHRASE: ${{ secrets.PB_PASSPHRASE }}
        run: |
          set -euo pipefail
          # Локальная расшифровка закоммиченного архива — без обращений вовне.
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -in PureBasic_5_31_x64.tgz.enc -out pb.tgz -pass env:PB_PASSPHRASE
          mkdir -p "$HOME/purebasic"
          # Архив содержит верхнюю папку purebasic/ -> --strip-components=1
          tar -xzf pb.tgz -C "$HOME/purebasic" --strip-components=1
          rm -f pb.tgz
          echo "PUREBASIC_HOME=$HOME/purebasic" >> "$GITHUB_ENV"
          test -f "$HOME/purebasic/compilers/pbcompiler"

      - name: Build libcuda link-stub
        run: |
          set -euo pipefail
          # Код линкуется с драйверной libcuda (ImportC "-lcuda"), а на раннере нет
          # NVIDIA-драйвера. В CI бинарник только собирается, не запускается, поэтому
          # генерируем пустую libcuda.so ЛОКАЛЬНО (без загрузок) — только чтобы линкер
          # разрешил символы. SONAME = libcuda.so.1, как у настоящего драйвера, поэтому
          # на машине с RTX 3080 подхватится реальная библиотека.
          awk '/ImportC "-lcuda"/{f=1;next} /EndImport/{f=0} f' PureBasic/globals.pbi \
            | grep -oE 'cu[A-Za-z0-9_]+' | sort -u > syms.txt
          echo "CUDA symbols to stub:"; cat syms.txt
          awk '{print "void " $0 "(void){}"}' syms.txt > cuda_stub.c
          mkdir -p "$RUNNER_TEMP/cudastub"
          gcc -shared -fPIC -Wl,-soname,libcuda.so.1 -o "$RUNNER_TEMP/cudastub/libcuda.so" cuda_stub.c
          echo "LIBRARY_PATH=$RUNNER_TEMP/cudastub" >> "$GITHUB_ENV"

      - name: Build (pbcompiler)
        run: |
          set -euo pipefail
          # Свой gcc-wrapper вместо compilar.sh: помимо -no-pie -z execstack (нужно
          # для R_X86_64_PC32 на современных дистрибутивах) добавляет --no-as-needed
          # и -lcuda в КОНЕЦ строки линковки. Иначе линкер с дефолтным --as-needed
          # отбрасывает libcuda (её -lcuda в команде pbcompiler стоит до объектников).
          mkdir -p "$RUNNER_TEMP/fakegcc"
          {
            echo '#!/bin/bash'
            echo "exec /usr/bin/gcc -no-pie -z execstack -Wl,--no-as-needed \"\$@\" -L$RUNNER_TEMP/cudastub -lcuda"
          } > "$RUNNER_TEMP/fakegcc/gcc"
          chmod +x "$RUNNER_TEMP/fakegcc/gcc"
          export PATH="$RUNNER_TEMP/fakegcc:$PATH"
          cd PureBasic
          "$PUREBASIC_HOME/compilers/pbcompiler" Collider.pb -e ../x64/Collider_Linux -t -c
          test -f ../x64/Collider_Linux
          echo "=== Собранный бинарник ==="; ls -la ../x64/Collider_Linux
          echo "=== Зависимость от libcuda.so.1 (реальный драйвер на GPU-хосте) ==="
          readelf -d ../x64/Collider_Linux | grep -i cuda || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Collider_Linux
          path: x64/Collider_Linux
          if-no-files-found: error

  # Раскомментируйте, если нужен и Windows-бинарник. Windows-инсталлятор тоже лежит
  # в репозитории зашифрованным (PureBasic_5_31_x64.exe.enc), тем же секретом PB_PASSPHRASE.
  # Примечание: .exe — это ИНСТАЛЛЯТОР; шаг ниже его расшифровывает и запускает тихую
  # установку. Проверьте флаг тихой установки для вашей версии PureBasic.
