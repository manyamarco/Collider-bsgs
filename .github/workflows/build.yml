name: Build Collider-BSGS

# Сборка требует коммерческого компилятора PureBasic (v5.31+), которого нет
# в стандартных раннерах GitHub и нельзя поставить через apt. Дистрибутив хранится
# в самом репозитории в ЗАШИФРОВАННОМ виде (PureBasic_5_31_x64.tgz.enc, AES-256).
# Раннер расшифровывает его локально паролем из секрета PB_PASSPHRASE
# (Settings -> Secrets and variables -> Actions). Никаких обращений вовне нет.
#
# CUDA-ядро уже встроено в PureBasic/kernel_data.pbi, поэтому CUDA Toolkit / nvcc
# для СБОРКИ не нужен. GPU на раннере тоже не нужен — но и запустить/протестировать
# бинарник в CI нельзя (у раннеров нет видеокарты NVIDIA). CI = только сборка + артефакт.

on:
  push:
    branches: [ main ]
    paths:
      - 'PureBasic/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard - secret present
        run: |
          if [ -z "${{ secrets.PB_PASSPHRASE }}" ]; then
            echo "::error::Задайте секрет PB_PASSPHRASE (пароль расшифровки PureBasic_5_31_x64.tgz.enc)."
            exit 1
          fi

      - name: Decrypt & unpack PureBasic
        env:
          PB_PASSPHRASE: ${{ secrets.PB_PASSPHRASE }}
        run: |
          set -euo pipefail
          # Локальная расшифровка закоммиченного архива — без обращений вовне.
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -in PureBasic_5_31_x64.tgz.enc -out pb.tgz -pass env:PB_PASSPHRASE
          mkdir -p "$HOME/purebasic"
          # Архив содержит верхнюю папку purebasic/ -> --strip-components=1
          tar -xzf pb.tgz -C "$HOME/purebasic" --strip-components=1
          rm -f pb.tgz
          echo "PUREBASIC_HOME=$HOME/purebasic" >> "$GITHUB_ENV"
          test -f "$HOME/purebasic/compilers/pbcompiler"

      - name: Build (compilar.sh)
        working-directory: PureBasic
        run: |
          set -euo pipefail
          chmod +x compilar.sh
          ./compilar.sh
          test -f ../x64/Collider_Linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Collider_Linux
          path: x64/Collider_Linux
          if-no-files-found: error

  # Раскомментируйте, если нужен и Windows-бинарник. Windows-инсталлятор тоже лежит
  # в репозитории зашифрованным (PureBasic_5_31_x64.exe.enc), тем же секретом PB_PASSPHRASE.
  # Примечание: .exe — это ИНСТАЛЛЯТОР; шаг ниже его расшифровывает и запускает тихую
  # установку. Проверьте флаг тихой установки для вашей версии PureBasic.
